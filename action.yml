name: "Harbor CLI Setup"
description: "Download, verify, and install the Harbor CLI"
author: "Patrick Eschenbach"

branding:
  icon: 'package'
  color: 'green'

inputs:
  version:
    description: "Harbor CLI version to install, for example v0.0.19 or latest"
    required: false
    default: "latest"

  build_from_source:
    description: "Build Harbor CLI from the latest main branch instead of downloading a release"
    required: false
    default: "false"

runs:
  using: "node24"
  main: "dist/index.js"