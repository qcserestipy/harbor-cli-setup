name: Tests

on:
  push:
    branches:
      - dev
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
        - uses: actions/checkout@v4

        - name: Build Harbor CLI latest
          uses: ./

